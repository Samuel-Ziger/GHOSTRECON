<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GHOSTRECON — Cortex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0d0d12;
      --bg2:       #13131a;
      --bg3:       #191921;
      --bg4:       #1f1f29;
      --rail:      #111118;
      --border:    #2a2a38;
      --border2:   #3a3a50;
      --text:      #cdc9e0;
      --text2:     #8884a8;
      --dim:       #55526e;
      --accent:    #8b5cf6;
      --accent-hi: #a78bfa;
      --accent-lo: rgba(139,92,246,0.15);
      --green:     #34d399;
      --green-lo:  rgba(52,211,153,0.12);
      --red:       #f87171;
      --yellow:    #fbbf24;
      --mono:      'JetBrains Mono', ui-monospace, monospace;
      --sans:      'Syne', system-ui, sans-serif;
      --radius:    6px;
      --glow-accent: 0 0 20px rgba(139,92,246,0.35), 0 0 60px rgba(139,92,246,0.12);
      --glow-green:  0 0 16px rgba(52,211,153,0.4),  0 0 50px rgba(52,211,153,0.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.5;
      display: grid;
      grid-template-columns: 42px minmax(200px, 260px) 1fr;
      grid-template-rows: auto 1fr;
      overflow: hidden;
      height: 100vh;
    }

    /* ─── DEMO BANNER ─── */
    #demoBanner {
      grid-column: 1 / -1;
      grid-row: 1;
    }
    .demo-banner {
      display: none;
      padding: 7px 18px;
      background: linear-gradient(90deg, rgba(139,92,246,0.22), rgba(52,211,153,0.1));
      border-bottom: 1px solid rgba(139,92,246,0.3);
      font-family: var(--mono);
      font-size: 10px;
      color: #c4bde8;
      letter-spacing: 0.03em;
    }
    .demo-banner strong { color: var(--green); font-weight: 500; }
    .demo-banner code { color: var(--accent-hi); background: rgba(139,92,246,0.15); padding: 1px 5px; border-radius: 3px; }

    /* ─── RIBBON (ícones verticais, como Obsidian) ─── */
    .ribbon {
      grid-column: 1;
      grid-row: 2;
      background: var(--rail);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0;
      gap: 4px;
      z-index: 10;
    }
    .ribbon-logo {
      width: 26px;
      height: 26px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ribbon-logo svg { width: 20px; height: 20px; }
    .ribbon-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: var(--dim);
      cursor: pointer;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
    }
    .ribbon-btn:hover { color: var(--accent-hi); background: var(--accent-lo); }
    .ribbon-btn.active { color: var(--green); background: var(--green-lo); }
    .ribbon-btn svg { width: 16px; height: 16px; }
    .ribbon-spacer { flex: 1; }

    /* ─── FILE TREE SIDEBAR ─── */
    .rail {
      grid-column: 2;
      grid-row: 2;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }
    .rail-head {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border);
    }
    .rail-brand {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 700;
      color: var(--accent-hi);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .rail-sub {
      font-size: 9px;
      color: var(--dim);
      margin-top: 4px;
      letter-spacing: 0.04em;
    }
    .rail-search {
      margin: 8px 10px 0;
      position: relative;
    }
    .rail-search input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 5px 8px 5px 26px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .rail-search input:focus { border-color: var(--accent); }
    .rail-search input::placeholder { color: var(--dim); }
    .rail-search svg {
      position: absolute;
      left: 7px;
      top: 50%;
      transform: translateY(-50%);
      width: 12px;
      height: 12px;
      color: var(--dim);
      pointer-events: none;
    }

    .rail-section {
      padding: 10px 14px 4px;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--dim);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .rail-section-badge {
      font-size: 9px;
      color: var(--accent-hi);
      background: var(--accent-lo);
      border-radius: 3px;
      padding: 0 5px;
    }

    .rail-fake {
      padding: 6px 10px 10px;
      border-bottom: 1px solid var(--border);
    }
    .rail-fake-btn {
      width: 100%;
      padding: 7px 10px;
      border: 1px dashed rgba(139,92,246,0.35);
      border-radius: var(--radius);
      background: rgba(139,92,246,0.05);
      color: var(--accent-hi);
      font-family: var(--mono);
      font-size: 9px;
      cursor: pointer;
      line-height: 1.4;
      text-align: left;
      transition: background 0.15s, border-color 0.15s;
    }
    .rail-fake-btn::before { content: '⚡ '; }
    .rail-fake-btn:hover:not(:disabled) { background: rgba(139,92,246,0.12); border-color: rgba(139,92,246,0.6); }
    .rail-fake-btn:disabled { opacity: 0.5; cursor: wait; }

    .rail-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .rail-list::-webkit-scrollbar { width: 4px; }
    .rail-list::-webkit-scrollbar-track { background: transparent; }
    .rail-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .nav-folder {
      padding: 5px 14px 3px;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .nav-folder svg { width: 10px; height: 10px; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      text-align: left;
      padding: 6px 14px 6px 22px;
      border: none;
      border-left: 2px solid transparent;
      background: transparent;
      color: var(--text2);
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
      transition: color 0.12s, background 0.12s, border-color 0.12s;
      position: relative;
    }
    .nav-item::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--dim);
      flex-shrink: 0;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .nav-item:hover::before { background: var(--accent-hi); }
    .nav-item.is-active {
      border-left-color: var(--green);
      background: var(--green-lo);
      color: var(--green);
    }
    .nav-item.is-active::before { background: var(--green); box-shadow: var(--glow-green); }
    .nav-item-label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .nav-count {
      font-size: 9px;
      opacity: 0.6;
      background: rgba(255,255,255,0.06);
      border-radius: 3px;
      padding: 0 5px;
      flex-shrink: 0;
    }
    .nav-item.is-active .nav-count { background: rgba(52,211,153,0.15); color: var(--green); opacity: 1; }

    /* ─── MAIN CANVAS ─── */
    main.cortex-main {
      grid-column: 3;
      grid-row: 2;
      min-width: 0;
      display: flex;
      flex-direction: column;
      position: relative;
      background:
        radial-gradient(ellipse 60% 50% at 50% 10%, rgba(80,50,130,0.12), transparent 55%),
        var(--bg);
      overflow: hidden;
    }

    .canvas-head {
      padding: 11px 20px 9px;
      border-bottom: 1px solid var(--border);
      background: rgba(19,19,26,0.7);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .canvas-breadcrumb {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--dim);
    }
    .canvas-breadcrumb span { color: var(--text); }
    .canvas-title {
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
      flex: 1;
    }
    .canvas-title-accent { color: var(--accent-hi); }
    .canvas-hint {
      font-size: 9px;
      color: var(--dim);
      width: 100%;
      padding-top: 1px;
    }

    .canvas-head-main {
      flex: 1;
      min-width: 0;
      position: relative;
    }
    .canvas-ghost-bg {
      position: absolute;
      left: -4%;
      top: 42%;
      transform: translateY(-50%);
      width: min(200px, 34vw);
      max-height: 120px;
      opacity: 0.12;
      z-index: 0;
      pointer-events: none;
    }
    .canvas-ghost-bg svg {
      display: block;
      width: 100%;
      height: auto;
      filter: drop-shadow(0 0 24px rgba(139, 92, 246, 0.35));
    }
    .canvas-head-front {
      position: relative;
      z-index: 1;
    }

    .category-teach {
      margin-top: 10px;
      padding: 10px 12px 10px 14px;
      border-radius: var(--radius);
      border: 1px solid rgba(139, 92, 246, 0.28);
      background: rgba(139, 92, 246, 0.07);
      max-width: min(56em, 100%);
    }
    .category-teach[hidden] {
      display: none !important;
    }
    .category-teach-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
    }
    .category-teach-head strong {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 700;
      color: var(--accent-hi);
      letter-spacing: 0.02em;
    }
    .category-teach-dismiss {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg3);
      color: var(--text2);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
    }
    .category-teach-dismiss:hover {
      border-color: var(--accent-hi);
      color: var(--accent-hi);
    }
    .category-teach-para {
      margin: 0;
      font-size: 10px;
      color: var(--text2);
      line-height: 1.55;
    }

    .canvas-ghost-bg .ghost-anim-cortex {
      transform-origin: 24px 26px;
      animation: cortex-ghost-sway 3s ease-in-out infinite;
    }
    .canvas-ghost-bg .ghost-eye-cortex {
      transform-origin: center;
      transform-box: fill-box;
      animation: cortex-ghost-blink 5s ease-in-out infinite;
    }
    .canvas-ghost-bg .ghost-eye-cortex-r {
      animation-delay: 0.06s;
    }
    @keyframes cortex-ghost-sway {
      0%,
      100% {
        transform: rotate(-3deg);
      }
      50% {
        transform: rotate(3deg);
      }
    }
    @keyframes cortex-ghost-blink {
      0%,
      47%,
      53%,
      100% {
        transform: scaleY(1);
      }
      50% {
        transform: scaleY(0.12);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .canvas-ghost-bg .ghost-anim-cortex,
      .canvas-ghost-bg .ghost-eye-cortex {
        animation: none !important;
      }
    }

    .canvas-head-tools {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .toggle-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 9px;
      color: var(--dim);
      user-select: none;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--bg3);
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .toggle-pill:hover { border-color: var(--accent); color: var(--accent-hi); }
    .toggle-pill input { display: none; }
    .toggle-pill-dot {
      width: 14px;
      height: 8px;
      border-radius: 4px;
      background: var(--border2);
      position: relative;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle-pill-dot::after {
      content: '';
      position: absolute;
      top: 1px;
      left: 1px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--dim);
      transition: transform 0.2s, background 0.2s;
    }
    #toggleObsidianGraph:checked ~ .toggle-pill .toggle-pill-dot { background: rgba(139,92,246,0.4); }
    #toggleObsidianGraph:checked ~ .toggle-pill .toggle-pill-dot::after { transform: translateX(6px); background: var(--accent-hi); }

    .canvas-stats {
      display: flex;
      gap: 12px;
    }
    .stat-pill {
      font-size: 9px;
      color: var(--dim);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .stat-pill strong { color: var(--text); font-weight: 500; }

    .canvas-body {
      flex: 1;
      overflow: auto;
      padding: 20px 22px 80px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      position: relative;
    }
    .canvas-body::-webkit-scrollbar { width: 5px; }
    .canvas-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    .canvas-body--graph {
      overflow: hidden;
      padding: 0;
    }

    /* ─── EMPTY STATE ─── */
    .empty-canvas {
      margin-top: 12vh;
      max-width: 38em;
      font-size: 11px;
      color: var(--dim);
      line-height: 1.7;
    }
    .empty-canvas h2 {
      font-family: var(--sans);
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }
    .empty-canvas code {
      color: var(--accent-hi);
      background: var(--accent-lo);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 10px;
    }
    .empty-canvas .kbd {
      display: inline-block;
      font-size: 9px;
      color: var(--text);
      background: var(--bg4);
      border: 1px solid var(--border2);
      border-radius: 3px;
      padding: 1px 6px;
    }
    .empty-shortcut-row { margin-top: 18px; display: flex; gap: 8px; flex-wrap: wrap; }

    /* ─── GRAPH / NODE GRID ─── */
    .graph-wrap {
      position: relative;
      min-height: 200px;
    }
    .graph-lines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(139,92,246,0.18) 1px, transparent 0);
      background-size: 24px 24px;
      opacity: 0.5;
    }
    .nodes {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .node {
      width: min(100%, 210px);
      padding: 11px 13px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg3);
      cursor: pointer;
      transition: border-color 0.18s, box-shadow 0.18s, transform 0.18s;
      text-align: left;
      position: relative;
      overflow: hidden;
    }
    .node::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 100%;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.18s;
    }
    .node:hover { border-color: rgba(139,92,246,0.5); box-shadow: 0 4px 24px rgba(0,0,0,0.4), 0 0 0 1px rgba(139,92,246,0.1); transform: translateY(-1px); }
    .node:hover::before { opacity: 1; }
    .node-target {
      font-size: 10px;
      color: var(--green);
      margin-bottom: 5px;
      font-weight: 500;
    }
    .node-type-badge {
      display: inline-block;
      font-size: 8px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 1px 5px;
      border-radius: 3px;
      background: var(--accent-lo);
      color: var(--accent-hi);
      margin-bottom: 6px;
    }
    .node-snippet { font-size: 10px; color: var(--text2); line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .node-meta { margin-top: 7px; font-size: 9px; color: var(--dim); display: flex; justify-content: space-between; }

    /* ─── OBSIDIAN GRAPH MODE ─── */
    @keyframes hub-float {
      0%,100% { transform: translate(-50%,-50%) translateY(0); box-shadow: var(--glow-accent), 0 0 0 1px rgba(139,92,246,0.5); }
      50% { transform: translate(-50%,-50%) translateY(-5px); box-shadow: var(--glow-accent), 0 0 0 1px rgba(139,92,246,0.7), 0 0 80px rgba(139,92,246,0.15); }
    }
    @keyframes node-drift {
      0%,100% { transform: translate(-50%,-50%) translate(0,0); }
      33% { transform: translate(-50%,-50%) translate(1.5px,-2.5px); }
      66% { transform: translate(-50%,-50%) translate(-1.5px,2px); }
    }
    @keyframes dot-drift {
      0% { background-position: 0 0; }
      100% { background-position: 48px 40px; }
    }
    @keyframes line-pulse {
      0%,100% { stroke-opacity: 0.15; }
      50% { stroke-opacity: 0.38; }
    }
    @keyframes ring-spin {
      from { transform: translate(-50%,-50%) rotate(0deg); }
      to { transform: translate(-50%,-50%) rotate(360deg); }
    }
    @keyframes fade-in {
      from { opacity: 0; } to { opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .obsidian-hub, .node--float, .obsidian-graph .graph-lines, .obsidian-radials line, .hub-ring { animation: none !important; }
    }

    .obsidian-graph {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 48%, rgba(80,45,140,0.18), transparent 60%),
        radial-gradient(ellipse 45% 35% at 75% 25%, rgba(30,90,100,0.1), transparent 50%),
        var(--bg);
      overflow: hidden;
      animation: fade-in 0.3s ease;
    }
    .obsidian-graph .graph-lines {
      opacity: 0.25;
      background-size: 22px 22px;
      animation: dot-drift 56s linear infinite;
    }

    .obsidian-radials {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    .obsidian-radials line {
      stroke: rgba(139,92,246,0.5);
      stroke-width: 0.6;
      vector-effect: non-scaling-stroke;
      animation: line-pulse 5s ease-in-out infinite;
    }
    .obsidian-radials line.line-green {
      stroke: rgba(52,211,153,0.35);
    }

    .obsidian-hub {
      position: absolute;
      z-index: 3;
      padding: 14px 22px;
      border-radius: 999px;
      border: 1px solid rgba(139,92,246,0.5);
      background: rgba(19,19,28,0.65);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 700;
      color: var(--accent-hi);
      text-align: center;
      letter-spacing: 0.04em;
      animation: hub-float 6.5s ease-in-out infinite;
      box-shadow: var(--glow-accent);
      white-space: nowrap;
      cursor: grab;
      pointer-events: auto;
      user-select: none;
      touch-action: none;
      transform: translate(-50%, -50%);
    }
    .obsidian-hub.is-hub-dragging {
      cursor: grabbing;
      animation: none;
      box-shadow: var(--glow-accent), 0 20px 60px rgba(0,0,0,0.7);
      border-color: rgba(139,92,246,0.9);
      transform: translate(-50%, -50%) scale(1.06);
    }
    .hub-ring {
      position: absolute;
      z-index: 2;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 1px dashed rgba(139,92,246,0.2);
      pointer-events: none;
      animation: ring-spin 30s linear infinite;
      transform: translate(-50%, -50%);
    }

    .obsidian-orbit-layer {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }
    .node--float {
      position: absolute;
      pointer-events: auto;
      width: auto;
      max-width: min(46vw, 360px);
      min-width: 0;
      margin: 0;
      padding: 9px 13px;
      border-radius: 8px;
      border: 1px solid rgba(139,92,246,0.2);
      background: rgba(16,16,22,0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03) inset;
      transform: translate(-50%,-50%);

      cursor: grab;
      transition: border-color 0.18s, box-shadow 0.18s;
      user-select: none;
      touch-action: none;
    }

      animation: node-drift 10s ease-in-out infinite;
    }

      cursor: grabbing;
      border-color: rgba(139,92,246,0.7) !important;

      z-index: 20 !important;

    /* ─── DRAWER ─── */

      z-index: 40;
      background: rgba(0,0,0,0.55);

    .drawer {

      background: var(--bg2);

    .drawer-head {

    .drawer-body {

  </style>
</head>

  function linkDisplayUrl(link){
    const snap=link.snapshot&&typeof link.snapshot==='object'?link.snapshot:null;
    let u=(link.url!=null&&String(link.url).trim())||(snap&&snap.url!=null&&String(snap.url).trim())||'';
    if(!u&&snap&&snap.value!=null){ const v=String(snap.value).trim(); if(/^(https?|ftp):\/\//i.test(v)) u=v.split(/\s/)[0].slice(0,400); }
    if(!u&&link.target) u=String(link.target);
    return u||'(sem URL)';

    const snap=link.snapshot;
    if(snap&&typeof snap==='object'){
      const v=snap.value!=null?String(snap.value):'';

      const line=[t,v].filter(Boolean).join(' — ');

  /** Texto curto educativo por tipo de vulnerabilidade (título da categoria). */
  function getCategoryTeach(title) {
    const t = String(title || '').toLowerCase();
    if (/xss/.test(t)) {
      return {
        headline: 'O que é XSS?',
        text: 'Cross-Site Scripting: código (normalmente JavaScript) injectado numa página que outra pessoa vê no browser. Pode ser reflected (payload na resposta), stored (persistido na base) ou DOM-based (lógica client-side insegura). Risco típico: roubar sessão, alterar conteúdo ou redireccionar a vítima.',
      };
    }
    if (/sql|inje(c|ç)/.test(t)) {
      return {
        headline: 'O que é SQL Injection?',
        text: 'Parte da entrada do utilizador é concatenada a uma query SQL sem saneamento, permitindo ao atacante alterar a lógica da query (filtros, UNION, escrita). Pode levar a leitura ou destruição de dados. Defesa: consultas parametrizadas, ORM com cuidado e princípio do menor privilégio na base.',
      };
    }
    if (/ftp/.test(t)) {
      return {
        headline: 'O que é FTP inseguro?',
        text: 'Serviços FTP mal configurados (anónimo, sem TLS, credenciais fracas ou directórios graváveis) expõem ficheiros ou permitem upload abusivo. Em bug bounty costuma ser prioridade média a alta conforme exposição e dados acessíveis.',
      };
    }
    if (/idor/.test(t)) {
      return {
        headline: 'O que é IDOR?',
        text: 'Insecure Direct Object Reference: o servidor expõe objectos (IDs, ficheiros, APIs) sem verificar se o utilizador autenticado tem permissão para esse objecto específico. Muitas vezes basta alterar um ID na URL ou no corpo do pedido para aceder a dados de outro utilizador.',
      };
    }
    if (/ssrf/.test(t)) {
      return {
        headline: 'O que é SSRF?',
        text: 'Server-Side Request Forgery: o servidor faz pedidos HTTP (ou outros) a destinos escolhidos pelo atacante. Pode servir para ler metadata em clouds, varrer portas internas ou encadear com outros bugs.',
      };
    }
    if (/lfi|path traversal|traversal|file include/.test(t)) {
      return {
        headline: 'O que é LFI / path traversal?',
        text: 'Inclusão ou leitura de ficheiros fora do directório previsto (../, wrappers, etc.), por vezes levando a exposição de credenciais ou código. Validação estrita de caminhos e listas brancas reduzem o risco.',
      };
    }
    if (/rce|remote code|command inj|exec/.test(t)) {
      return {
        headline: 'O que é RCE / injecção de comandos?',
        text: 'Execução de código ou comandos no servidor (ou no cliente, em casos limitados) controlada pelo atacante. É das classes mais graves: pode implicar compromisso total do host.',
      };
    }
    if (/csrf/.test(t)) {
      return {
        headline: 'O que é CSRF?',
        text: 'Cross-Site Request Forgery: enganar o browser da vítima a enviar pedidos autenticados a um site onde ela já tem sessão. Mitigação: tokens anti-CSRF, SameSite em cookies e verificação de origem.',
      };
    }
    if (/xxe/.test(t)) {
      return {
        headline: 'O que é XXE?',
        text: 'XML External Entity: parsers XML mal configurados processam entidades externas e podem vazar ficheiros locais ou fazer SSRF. Desactivar entidades externas ou usar formatos mais seguros ajuda.',
      };
    }
    return {
      headline: 'Sobre esta categoria',
      text: 'Esta pasta do Cérebro agrupa achados que ligaste manualmente a este tipo a partir da checklist no GHOSTRECON. Usa o mapa ou a grelha para ver alvos; clica num nó para notas, fingerprint e snapshot completos.',
    };
  }

  function applyCategoryTeach(labelForTeach) {
    const box = $('categoryTeach');
    if (!box) return;
    if (!activeId) {
      box.hidden = true;
      return;
    }
    const label = String(labelForTeach || '').trim();
    if (!label) {
      box.hidden = true;
      return;
    }
    const { headline, text } = getCategoryTeach(label);
    $('categoryTeachHead').textContent = headline;
    $('categoryTeachPara').textContent = text;
    box.hidden = false;
  }

  function setErr(msg){
    const el=$('errBanner');
    el.style.display=msg?'block':'none';
    el.textContent=msg||'';
  }

  // ── search filter ──
  $('railSearchInput').addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll('.nav-item').forEach(btn => {
      const label = btn.querySelector('.nav-item-label');
      btn.style.display = !q || (label && label.textContent.toLowerCase().includes(q)) ? '' : 'none';
    });
  });

  function renderRail(){
    const host=$('railList');
    host.innerHTML='';
    $('catCount').textContent=categories.length;
    if(!categories.length){
      host.innerHTML='<p style="padding:14px 16px;font-size:10px;color:var(--dim);line-height:1.6;">Sem categorias.<br>No GHOSTRECON principal usa checklist + cérebro (SQLite), ou clica em <em>Simular</em> acima.</p>';
      return;
    }
    // folder header
    const folderEl=document.createElement('div');
    folderEl.className='nav-folder';
    folderEl.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>findings`;
    host.appendChild(folderEl);
    for(const c of categories){
      const b=document.createElement('button');
      b.type='button';
      b.className='nav-item'+(activeId===c.id?' is-active':'');
      b.innerHTML=`<span class="nav-item-label">${esc(c.title)}</span><span class="nav-count">${Number(c.linkCount)||0}</span>`;
      b.addEventListener('click', ()=>{ void selectCategory(c.id); });
      host.appendChild(b);
    }
  }

  // ── Obsidian Graph — spring physics ──
  const SPRING_STIFFNESS = 0.065; // força da mola (menor = mais lag)
  const SPRING_DAMPING   = 0.74;  // amortecimento (menor = oscila mais)
  const SETTLE_THRESHOLD = 0.08;  // velocidade mínima antes de parar o loop

  let graphState = null;
  let dragState  = null;

  function destroyGraphIfAny() {
    if (!graphState) {
      dragState = null;
      return;
    }
    try {
      if (graphState.resizeObserver) graphState.resizeObserver.disconnect();
    } catch (_) {}
    if (graphState.physicsRaf != null) {
      cancelAnimationFrame(graphState.physicsRaf);
    }
    graphState = null;
    dragState = null;
  }

  function buildObsidianGraph(title, links) {
    const container = document.getElementById('canvasBody');
    container.classList.add('canvas-body--graph');

    const W  = container.clientWidth  || 800;
    const H  = container.clientHeight || 600;
    const cx = W / 2, cy = H / 2;
    const rx = Math.min(W * 0.37, 320);
    const ry = Math.min(H * 0.36, 230);
    const n  = Math.max(links.length, 1);

    const nodes = links.map((link, i) => {
      const ang = (i / n) * 2 * Math.PI - Math.PI / 2;
      const x   = cx + Math.cos(ang) * rx;
      const y   = cy + Math.sin(ang) * ry;
      return {
        link,
        x, y,               // rendered position
        targetX: x,         // spring target
        targetY: y,
        vx: 0, vy: 0,       // velocity
        offsetX: x - cx,    // offset relative to hub
        offsetY: y - cy,
        el: null,
      };
    });

    // ── DOM ──
    const graph = document.createElement('div');
    graph.className = 'obsidian-graph';

    const dotsBg = document.createElement('div');
    dotsBg.className = 'graph-lines';
    dotsBg.setAttribute('aria-hidden', 'true');

    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('class', 'obsidian-radials');
    svg.setAttribute('aria-hidden', 'true');

    const hubRing = document.createElement('div');
    hubRing.className = 'hub-ring';
    hubRing.style.left = cx + 'px';
    hubRing.style.top  = cy + 'px';

    const hub = document.createElement('div');
    hub.className = 'obsidian-hub';
    hub.textContent = title;
    hub.style.left = cx + 'px';
    hub.style.top  = cy + 'px';

    const orbit = document.createElement('div');
    orbit.className = 'obsidian-orbit-layer';

    nodes.forEach((nd, idx) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'node node--float is-drifting';
      btn.style.left = nd.x + 'px';
      btn.style.top  = nd.y + 'px';
      btn.style.animationDelay = (idx * 0.62).toFixed(2) + 's';

      const fullUrl = linkDisplayUrl(nd.link);
      let host = '', path = fullUrl;
      try { const u = new URL(fullUrl); host = u.host; path = u.pathname + (u.search || ''); } catch (_) {}
      const shortPath = path.length > 46 ? path.slice(0, 44) + '…' : path;

      btn.innerHTML = `<span class="node-url-float"><span class="node-dot"></span><span><span class="node-url-float-host">${esc(host)}</span>${esc(shortPath)}</span></span>`;
      btn.title = fullUrl;
      btn.dataset.idx = idx;
      orbit.appendChild(btn);
      nd.el = btn;
    });

    graph.appendChild(dotsBg);
    graph.appendChild(svg);
    graph.appendChild(hubRing);
    graph.appendChild(hub);
    graph.appendChild(orbit);

    container.innerHTML = '';
    container.appendChild(graph);

    graphState = {
      nodes, hubX: cx, hubY: cy,
      hubEl: hub, hubRingEl: hubRing,
      container, svgEl: svg, orbitEl: orbit,
      physicsRaf: null,
      resizeObserver: null,
    };

    drawLines();
    attachDrag(container, orbit, hub, graph);
  }

  function drawLines() {
    if (!graphState) return;
    const { nodes, hubX, hubY, svgEl, container } = graphState;
    const W = container.clientWidth  || 800;
    const H = container.clientHeight || 600;

    svgEl.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svgEl.style.width  = W + 'px';
    svgEl.style.height = H + 'px';
    svgEl.innerHTML = '';

    nodes.forEach((nd, i) => {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', hubX);
      line.setAttribute('y1', hubY);
      line.setAttribute('x2', nd.x);
      line.setAttribute('y2', nd.y);
      line.style.animationDelay = (i * 0.4).toFixed(2) + 's';
      if (i % 3 === 0) line.classList.add('line-green');
      svgEl.appendChild(line);
    });
  }

  function startPhysicsLoop() {
    if (!graphState || graphState.physicsRaf) return;

    function tick() {
      if (!graphState) return;
      let active = false;

      graphState.nodes.forEach(nd => {
        if (nd._dragging) return; // directly dragged — skip physics

        const dx = nd.targetX - nd.x;
        const dy = nd.targetY - nd.y;

        nd.vx = (nd.vx + dx * SPRING_STIFFNESS) * SPRING_DAMPING;
        nd.vy = (nd.vy + dy * SPRING_STIFFNESS) * SPRING_DAMPING;

        const moving = Math.abs(nd.vx) > SETTLE_THRESHOLD ||
                       Math.abs(nd.vy) > SETTLE_THRESHOLD ||
                       Math.abs(dx)    > SETTLE_THRESHOLD ||
                       Math.abs(dy)    > SETTLE_THRESHOLD;

        if (moving) {
          nd.x += nd.vx;
          nd.y += nd.vy;
          nd.el.style.left = nd.x + 'px';
          nd.el.style.top  = nd.y + 'px';
          active = true;
        } else {
          // snap to target and kill velocity
          nd.x = nd.targetX; nd.y = nd.targetY;
          nd.vx = 0; nd.vy = 0;
          nd.el.style.left = nd.x + 'px';
          nd.el.style.top  = nd.y + 'px';
          // restore drift animation once settled
          if (!nd.el.classList.contains('is-drifting')) {
            nd.el.classList.add('is-drifting');
          }
        }
      });

      if (active) {
        drawLines();
        graphState.physicsRaf = requestAnimationFrame(tick);
      } else {
        graphState.physicsRaf = null;
      }
    }

    graphState.physicsRaf = requestAnimationFrame(tick);
  }

  function attachDrag(container, orbit, hub, graph) {
    // ── Hub drag: moves hub instantly, nodes follow with spring lag ──
    hub.addEventListener('pointerdown', e => {
      e.preventDefault();
      e.stopPropagation();
      hub.setPointerCapture(e.pointerId);
      hub.classList.add('is-hub-dragging');

      // snapshot offsets at drag start so nodes maintain relative positions as targets
      graphState.nodes.forEach(nd => {
        nd.offsetX = nd.x - graphState.hubX;
        nd.offsetY = nd.y - graphState.hubY;
        // strip drift animation so physics has clean control
        nd.el.classList.remove('is-drifting');
        // give initial velocity that "stays behind" (opposite of drag direction) for effect
        nd.vx *= 0.3;
        nd.vy *= 0.3;
      });

      dragState = {
        type: 'hub',
        startMouseX: e.clientX,
        startMouseY: e.clientY,
        startHubX: graphState.hubX,
        startHubY: graphState.hubY,
      };
    });

    hub.addEventListener('pointermove', e => {
      if (!dragState || dragState.type !== 'hub') return;
      e.preventDefault();

      const dx = e.clientX - dragState.startMouseX;
      const dy = e.clientY - dragState.startMouseY;

      graphState.hubX = dragState.startHubX + dx;
      graphState.hubY = dragState.startHubY + dy;

      // hub moves instantly
      graphState.hubEl.style.left    = graphState.hubX + 'px';
      graphState.hubEl.style.top     = graphState.hubY + 'px';
      graphState.hubRingEl.style.left = graphState.hubX + 'px';
      graphState.hubRingEl.style.top  = graphState.hubY + 'px';

      // update spring targets — nodes lag behind chasing these
      graphState.nodes.forEach(nd => {
        nd.targetX = graphState.hubX + nd.offsetX;
        nd.targetY = graphState.hubY + nd.offsetY;
      });

      // ensure physics loop is running
      if (!graphState.physicsRaf) startPhysicsLoop();

      // redraw lines from hub immediately (nodes will catch up via physics)
      drawLines();
    });

    const endHubDrag = () => {
      if (!dragState || dragState.type !== 'hub') return;
      hub.classList.remove('is-hub-dragging');
      dragState = null;
      // physics loop continues until nodes settle
      if (!graphState.physicsRaf) startPhysicsLoop();
    };
    hub.addEventListener('pointerup',     endHubDrag);
    hub.addEventListener('pointercancel', endHubDrag);

    // ── Individual node drag: direct control, no spring ──
    orbit.addEventListener('pointerdown', e => {
      const btn = e.target.closest('.node--float');
      if (!btn) return;
      const idx = Number(btn.dataset.idx);
      if (!Number.isFinite(idx)) return;

      e.preventDefault();
      btn.setPointerCapture(e.pointerId);

      const nd = graphState.nodes[idx];
      nd._dragging = true;
      btn.classList.remove('is-drifting');
      btn.classList.add('is-dragging');

      dragState = {
        type: 'node',
        nodeIdx: idx,
        startMouseX: e.clientX,
        startMouseY: e.clientY,
        startNodeX: nd.x,
        startNodeY: nd.y,
      };
    });

    orbit.addEventListener('pointermove', e => {
      if (!dragState || dragState.type !== 'node') return;
      e.preventDefault();
      const { nodeIdx, startMouseX, startMouseY, startNodeX, startNodeY } = dragState;
      const nd = graphState.nodes[nodeIdx];
      nd.x = startNodeX + (e.clientX - startMouseX);
      nd.y = startNodeY + (e.clientY - startMouseY);
      nd.targetX = nd.x;
      nd.targetY = nd.y;
      nd.vx = 0; nd.vy = 0;
      nd.el.style.left = nd.x + 'px';
      nd.el.style.top  = nd.y + 'px';
      drawLines();
    });

    const endNodeDrag = () => {
      if (!dragState || dragState.type !== 'node') return;
      const nd = graphState.nodes[dragState.nodeIdx];
      nd._dragging = false;
      // update relative offset so hub drag keeps this new position
      nd.offsetX = nd.x - graphState.hubX;
      nd.offsetY = nd.y - graphState.hubY;
      nd.el.classList.remove('is-dragging');
      nd.el.classList.add('is-drifting');
      dragState = null;
    };
    orbit.addEventListener('pointerup',     endNodeDrag);
    orbit.addEventListener('pointercancel', endNodeDrag);

    // click vs drag: drawer only on tap with no movement
    orbit.addEventListener('click', e => {
      if (dragState) return;
      const btn = e.target.closest('.node--float');
      if (!btn || !graphState) return;
      const idx = Number(btn.dataset.idx);
      if (!Number.isFinite(idx)) return;
      openDrawer(graphState.nodes[idx].link, activeCategoryTitle);
    });

    // redraw lines on container resize
    let resizeRaf;
    const ro = new ResizeObserver(() => {
      cancelAnimationFrame(resizeRaf);
      resizeRaf = requestAnimationFrame(drawLines);
    });
    ro.observe(container);
    graphState.resizeObserver = ro;
  }


  function renderCanvas(categoryTitle){
    const titleEl=$('canvasTitle'), hintEl=$('canvasHint'), body=$('canvasBody');
    const statsEl=$('canvasStats');
    $('breadcrumbCat').textContent=categoryTitle||'—';

    destroyGraphIfAny();
    body.classList.remove('canvas-body--graph');

    if(!activeId){
      const teachBox = $('categoryTeach');
      if (teachBox) teachBox.hidden = true;
      titleEl.innerHTML='<span class="canvas-title-accent">Cortex</span> — Cérebro';
      hintEl.textContent='Selecciona uma vulnerabilidade à esquerda para ver os alvos confirmados.';
      statsEl.style.display='none';
      body.innerHTML=`<div class="empty-canvas">
        <h2>Bem-vindo ao Cortex</h2>
        <p>Cada achado que ligares ao cérebro a partir da checklist no GHOSTRECON aparece aqui como um nó. Clica num nó para ver notas e snapshot no painel lateral.</p>
        <p style="margin-top:10px;">Com o <strong>Mapa local</strong> activado, o tipo fica no centro e os alvos orbitam à volta — igual ao grafo local do Obsidian. Podes <strong>arrastar</strong> cada nó livremente.</p>
        ${demoMode?'':'<p style="margin-top:10px;">Para pré-visualização fictícia clica em <strong>Simular GET…</strong> na barra lateral, ou usa <code>?demo=1</code> / <code>#demo</code> na URL.</p>'}
        <div class="empty-shortcut-row">
          <span class="kbd">Ctrl+K</span><span style="color:var(--dim);font-size:10px"> pesquisar notas</span>
          <span style="color:var(--dim);font-size:10px;margin-left:8px">Esc</span><span style="color:var(--dim);font-size:10px"> fechar painel</span>
        </div>
      </div>`;
      return;
    }

    titleEl.innerHTML=`<span class="canvas-title-accent">${esc(categoryTitle)}</span>`;
    statsEl.style.display='flex';
    $('statNodes').textContent=activeLinks.length;
    $('statType').textContent=activeLinks[0]?.snapshot?.type||'—';

    applyCategoryTeach(String(categoryTitle || activeCategoryTitle || '').trim());

    if(!activeLinks.length){
      hintEl.textContent='Sem alvos ligados a este tipo — valida na checklist no GHOSTRECON e adiciona ao cérebro.';
      body.innerHTML='<p class="empty-canvas">Sem nós nesta categoria. Liga achados na checklist (app principal) ao cérebro.</p>';
      return;
    }

    hintEl.textContent=isObsidianMode()
      ? `${activeLinks.length} nó(s) · Arrasta o centro para mover tudo · arrasta um nó individualmente · clica para detalhes`
      : `${activeLinks.length} confirmação(ões) · clica num cartão para abrir o painel lateral`;

    if(isObsidianMode()){
      // defer to let the DOM settle so clientWidth/Height are correct
      body.innerHTML = '';
      requestAnimationFrame(() => buildObsidianGraph(categoryTitle||activeCategoryTitle||'Tipo', activeLinks));
      return;
    }

    const nodes=activeLinks.map((link,idx)=>{
      const snap=link.snapshot||{};
      const type=snap.type||'';
      return `<button type="button" class="node" data-idx="${idx}">
        ${type?`<span class="node-type-badge">${esc(type)}</span>`:''}
        <div class="node-target">${esc(link.target)}</div>
        <div class="node-snippet">${esc(snippetFromLink(link))}</div>
        <div class="node-meta">
          <span>${esc(String(link.fingerprint||'').slice(0,12))}…</span>
          <span>${esc(String(link.linked_at||'').slice(0,10))}</span>
        </div>
      </button>`;
    }).join('');

    body.innerHTML=`<div class="graph-wrap"><div class="graph-lines" aria-hidden="true"></div><div class="nodes">${nodes}</div></div>`;
  }

  function openDrawer(link, categoryTitle){
    const drawer=$('drawer'), backdrop=$('drawerBackdrop');
    $('drawerTitle').textContent=categoryTitle||'Detalhe';
    const snap=link.snapshot||{};
    const prio=snap.prio||'';
    const type=snap.type||'';
    const prioClass=prio==='high'?'drawer-tag-prio-high':prio==='medium'?'drawer-tag-prio-medium':'';
    $('drawerBody').innerHTML=`
      ${type?`<div style="margin-bottom:12px;"><span class="drawer-tag drawer-tag-type">${esc(type)}</span>${prioClass?`<span class="drawer-tag ${prioClass}">${esc(prio)}</span>`:''}</div>`:''}
      <div class="drawer-section"><div class="drawer-label">Alvo</div><pre class="drawer-pre">${esc(link.target)}</pre></div>
      <div class="drawer-section"><div class="drawer-label">URL</div><pre class="drawer-pre">${esc(linkDisplayUrl(link))}</pre></div>
      <div class="drawer-section"><div class="drawer-label">Fingerprint</div><pre class="drawer-pre">${esc(link.fingerprint)}</pre></div>
      <div class="drawer-section"><div class="drawer-label">Notas</div><pre class="drawer-pre">${esc(link.notes||'—')}</pre></div>
      <div class="drawer-section"><div class="drawer-label">Snapshot</div><pre class="drawer-pre">${esc(JSON.stringify(link.snapshot||{},null,2))}</pre></div>
    `;
    drawer.classList.add('is-open'); drawer.setAttribute('aria-hidden','false');
    backdrop.classList.add('is-open'); backdrop.setAttribute('aria-hidden','false');
  }

  function closeDrawer(){
    $('drawer').classList.remove('is-open'); $('drawer').setAttribute('aria-hidden','true');
    const b=$('drawerBackdrop'); b.classList.remove('is-open'); b.setAttribute('aria-hidden','true');
  }

  async function selectCategory(id){
    activeId=id; setErr(''); renderRail();
    if(demoMode&&CORTEX_DEMO_LINKS[id]){
      activeLinks=CORTEX_DEMO_LINKS[id].map(x=>({...x}));
      const cat=CORTEX_DEMO_CATEGORIES.find(c=>c.id===id);
      activeCategoryTitle=cat?cat.title:'Categoria';
      try{ const u=new URL(location.href); u.hash=String(id); history.replaceState(null,'',u.toString()); }catch(_){}
      renderCanvas(activeCategoryTitle); return;
    }
    try{
      const r=await fetch(apiUrl('/api/brain/category/'+encodeURIComponent(String(id))),{cache:'no-store'});
      const d=await r.json().catch(()=>({}));
      if(!r.ok) throw new Error(d.error||String(r.status));
      activeLinks=Array.isArray(d.links)?d.links:[];
      activeCategoryTitle=d.category?.title||'Categoria';
      try{ const u=new URL(location.href); u.hash=String(id); history.replaceState(null,'',u.toString()); }catch(_){}
      renderCanvas(activeCategoryTitle);
    } catch(e){
      activeLinks=[];activeCategoryTitle='';
      setErr(String(e.message||e)); renderCanvas('');
    }
  }

  async function boot(){
    demoMode=isCortexDemoMode();
    if(demoMode){
      applyDemoChrome();
      categories=CORTEX_DEMO_CATEGORIES.map(c=>({...c}));
      setErr('');
    } else {
      try{
        const r=await fetch(apiUrl('/api/brain/categories'),{cache:'no-store'});
        const d=await r.json().catch(()=>({}));
        categories=Array.isArray(d.items)?d.items:[];
      } catch(e){
        setErr('Não foi possível carregar categorias: '+(e.message||e));
        categories=[];
      }
    }
    restoreToggle();
    renderRail();
    const h=(location.hash||'').replace(/^#/,'').trim().toLowerCase();
    const n=h==='demo'?NaN:Number(h);
    if(Number.isFinite(n)&&n>0&&categories.some(c=>c.id===n)) await selectCategory(n);
    else { activeId=null;activeLinks=[];activeCategoryTitle='';renderCanvas(''); }
  }

  // ── events ──
  $('categoryTeachDismiss')?.addEventListener('click', () => {
    const b = $('categoryTeach');
    if (b) b.hidden = true;
  });

  $('drawerClose').addEventListener('click', closeDrawer);
  $('drawerBackdrop').addEventListener('click', closeDrawer);
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDrawer();
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault();
      $('railSearchInput')?.focus();
      $('railSearchInput')?.select();
    }
  });

  // grid-mode node clicks (graph-mode nodes handle clicks internally via attachDrag)
  $('canvasBody').addEventListener('click', ev=>{
    if (graphState) return; // graph mode handles its own clicks
    const n=ev.target.closest('.node');
    if(!n||!$('canvasBody').contains(n)) return;
    const idx=Number(n.dataset.idx);
    if(!Number.isFinite(idx)||!activeLinks[idx]) return;
    openDrawer(activeLinks[idx], activeCategoryTitle);
  });

  $('toggleObsidianGraph').addEventListener('change', ()=>{
    persistToggle();
    if(activeId&&activeLinks.length) renderCanvas(activeCategoryTitle);
  });

  $('btnFakeBrain').addEventListener('click', async ()=>{
    const btn=$('btnFakeBrain'), sub=$('railSub');
    setErr(''); btn.disabled=true;
    if(sub) sub.textContent='A simular…';
    try{
      categories=await fakeFetchBrainCategories(420);
      demoMode=true; applyDemoChrome();
      activeId=null;activeLinks=[];
      renderRail(); renderCanvas('');
      if(categories.length) await selectCategory(categories[0].id);
    } catch(e){
      setErr('Prévia fictícia falhou: '+(e.message||e));
      if(sub) sub.textContent='Tipos do cérebro · checklist manual (SQLite local)';
    } finally{ btn.disabled=false; }
  });

  void boot();
</script>
