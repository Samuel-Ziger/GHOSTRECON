<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GHOSTRECON — HTTP History</title>
  <meta http-equiv="refresh" content="0;url=/ghostmap/history" />
  <script>
    (function () {
      var dest = '/ghostmap/history';
      try {
        var q = window.location.search || '';
        if (q) dest += q;
      } catch (_) {}
      try { window.location.replace(dest); } catch (_) { window.location.href = dest; }
    })();
  </script>
</head>
<body style="font-family:system-ui,sans-serif;background:#080c10;color:#c4d4da;padding:2rem">
  <p>A redirecionar para <a href="/ghostmap/history" style="color:#00d4ff">GhostMap · HTTP History</a>…</p>
  <p style="color:#6a8090;font-size:13px">Se não redirecionar, confirma que a stack está a correr (<code>npm start</code>).</p>
</body>
</html>
